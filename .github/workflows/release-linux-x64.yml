name: Release Linux x64

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/release-linux-x64.yml
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag
        required: true
        default: v0.1.0-alpha.2

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ inputs.release_tag || 'v0.1.0-alpha.2' }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux WebView dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux x64 packages
        run: pnpm tauri build --bundles appimage,deb

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/deb/*.deb \
            --clobber

      - name: Archive Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: ForgeDesk-${{ env.RELEASE_TAG }}-linux-x64
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
