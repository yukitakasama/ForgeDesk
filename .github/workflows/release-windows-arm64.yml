name: Release Windows ARM64

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/release-windows-arm64.yml
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag
        required: true
        default: v0.1.0-alpha.2

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-2025
    env:
      CC_aarch64_pc_windows_msvc: clang-cl
      CXX_aarch64_pc_windows_msvc: clang-cl
      RELEASE_TAG: ${{ inputs.release_tag || 'v0.1.0-alpha.2' }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Rust ARM64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows ARM64 installer
        run: pnpm tauri build --bundles nsis --target aarch64-pc-windows-msvc

      - name: Upload installer to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = Resolve-Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*setup.exe"
          gh release upload "$env:RELEASE_TAG" "$asset" --clobber

      - name: Archive installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForgeDesk-${{ env.RELEASE_TAG }}-windows-arm64
          path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*setup.exe
          if-no-files-found: error
